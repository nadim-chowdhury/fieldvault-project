name: Mobile — Test, Build & Deploy

on:
  push:
    branches:
      - main
      - staging
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    branches:
      - main
      - staging
    paths:
      - "apps/mobile/**"
      - "packages/**"

  # Allow manual trigger for store builds
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Type Check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter mobile lint

      - name: Type check
        run: pnpm --filter mobile type-check

  # ─────────────────────────────────────────────
  # JOB 2: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --filter mobile test

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: apps/mobile/coverage
          flags: mobile
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 3: OTA Update — staging branch
  # Pushes JS-only changes instantly (no store review)
  # ─────────────────────────────────────────────
  ota-staging:
    name: OTA Update (Staging)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to staging
        working-directory: apps/mobile
        run: |
          eas update \
            --branch staging \
            --message "Staging update — ${{ github.sha }}" \
            --non-interactive
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          EXPO_PUBLIC_APP_URL: ${{ secrets.STAGING_APP_URL }}

  # ─────────────────────────────────────────────
  # JOB 4: OTA Update — production (main branch)
  # JS-only changes ship instantly without store review
  # ─────────────────────────────────────────────
  ota-production:
    name: OTA Update (Production)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to production
        working-directory: apps/mobile
        run: |
          eas update \
            --branch production \
            --message "Production update — ${{ github.sha }}" \
            --non-interactive
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}
          EXPO_PUBLIC_APP_URL: ${{ secrets.PROD_APP_URL }}

  # ─────────────────────────────────────────────
  # JOB 5: EAS Build — Preview (internal testing)
  # Triggered manually or on native config changes
  # ─────────────────────────────────────────────
  build-preview:
    name: EAS Build (Preview — Internal)
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.profile == 'preview'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview (iOS + Android)
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform || 'all' }} \
            --profile preview \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          EXPO_PUBLIC_APP_URL: ${{ secrets.STAGING_APP_URL }}

      - name: Print build queue link
        run: echo "🏗️ Build queued — track at https://expo.dev/accounts/nadim-chowdhury/projects/fieldvault/builds"

  # ─────────────────────────────────────────────
  # JOB 6: EAS Build — Production (store release)
  # Only triggered manually with profile=production
  # ─────────────────────────────────────────────
  build-production:
    name: EAS Build (Production — Store)
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.profile == 'production'

    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build production (iOS + Android)
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform || 'all' }} \
            --profile production \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}
          EXPO_PUBLIC_APP_URL: ${{ secrets.PROD_APP_URL }}

      - name: Print build queue link
        run: echo "🏗️ Production build queued — track at https://expo.dev/accounts/nadim-chowdhury/projects/fieldvault/builds"

  # ─────────────────────────────────────────────
  # JOB 7: EAS Submit — Auto-submit after production build
  # Submits to App Store + Play Store
  # ─────────────────────────────────────────────
  submit-production:
    name: EAS Submit (App Store + Play Store)
    runs-on: ubuntu-latest
    needs: build-production
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.profile == 'production'

    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to stores
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform ${{ github.event.inputs.platform || 'all' }} \
            --latest \
            --non-interactive
